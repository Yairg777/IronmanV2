<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-Man AR HUD System</title>
    
    <!-- MediaPipe & Three.js CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #container { position: relative; width: 100vw; height: 100vh; }
        
        /* Video Background */
        #input_video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror mode */
        }

        /* Canvas for Three.js Overlay */
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* UI Layer - AI Assistant Panel */
        #ai-panel {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-left: 5px solid #ff0000;
            padding: 20px;
            color: white;
            backdrop-filter: blur(10px);
            border-radius: 0 15px 15px 0;
            z-index: 100;
            display: none; /* Shown via gesture */
            transition: all 0.5s ease;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .panel-header { font-weight: bold; color: #ff3333; margin-bottom: 10px; font-size: 1.2rem; letter-spacing: 2px; }
        
        #ai-response {
            height: 150px;
            overflow-y: auto;
            font-size: 0.9rem;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        #ai-input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid #ff0000;
            color: white;
            padding: 8px;
            box-sizing: border-box;
        }

        /* HUD Brackets */
        .hud-corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid #ff0000;
            z-index: 50;
            opacity: 0.6;
            pointer-events: none;
        }
        .top-left { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .top-right { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
        .bottom-left { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
        .bottom-right { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

        /* Scanning Line Effect */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(255, 0, 0, 0.2);
            position: absolute;
            z-index: 60;
            animation: scan 4s linear infinite;
        }
        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }

        .status-pill {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,0,0,0.5);
            color: white;
            padding: 5px 20px;
            border-radius: 20px;
            font-size: 12px;
            letter-spacing: 1px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="input_video"></video>
        <canvas id="output_canvas"></canvas>
        <div class="scanline"></div>
        
        <!-- HUD Elements -->
        <div class="hud-corner top-left"></div>
        <div class="hud-corner top-right"></div>
        <div class="hud-corner bottom-left"></div>
        <div class="hud-corner bottom-right"></div>

        <div id="ai-panel">
            <div class="panel-header">KAREN OS v2.1</div>
            <div id="ai-response">Welcome back, Peter. Systems online. Open your palm to keep HUD active.</div>
            <input type="text" id="ai-input" placeholder="Voice command or type here...">
        </div>

        <div class="status-pill" id="status">INITIALIZING SUIT...</div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const aiPanel = document.getElementById('ai-panel');
        const statusPill = document.getElementById('status');

        // Three.js Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvasElement, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xff0000, 1);
        pointLight.position.set(0, 5, 5);
        scene.add(pointLight);

        // SPIDER-MAN MASK COMPONENTS
        const maskGroup = new THREE.Group();
        scene.add(maskGroup);

        // Main Head Shape (Procedural Sphere)
        const headGeo = new THREE.IcosahedronGeometry(1, 2);
        const headMat = new THREE.MeshPhongMaterial({ 
            color: 0xaa0000, 
            wireframe: false,
            shininess: 100 
        });
        const head = new THREE.Mesh(headGeo, headMat);
        head.scale.set(1, 1.2, 0.8);
        maskGroup.add(head);

        // Eyes (White Lenses)
        const eyeGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
        leftEye.position.set(0.35, 0.2, 0.6);
        leftEye.scale.set(1.2, 0.6, 0.1);
        leftEye.rotation.z = -0.3;
        
        const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
        rightEye.position.set(-0.35, 0.2, 0.6);
        rightEye.scale.set(1.2, 0.6, 0.1);
        rightEye.rotation.z = 0.3;
        
        maskGroup.add(leftEye, rightEye);

        // Hand Visualization Logic
        const handPoints = [];
        const handLines = [];
        const MAX_HANDS = 2;

        function initHandVisuals() {
            const dotGeo = new THREE.SphereGeometry(0.015, 8, 8);
            const dotMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const lineMat = new THREE.LineBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.5 });

            for (let h = 0; h < MAX_HANDS; h++) {
                const dots = [];
                for (let i = 0; i < 21; i++) {
                    const dot = new THREE.Mesh(dotGeo, dotMat);
                    scene.add(dot);
                    dots.push(dot);
                }
                handPoints.push(dots);
                
                // Add connections
                const lineGroup = new THREE.Group();
                scene.add(lineGroup);
                handLines.push(lineGroup);
            }
        }
        initHandVisuals();

        // MediaPipe Initialization
        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        // Processing Logic
        faceMesh.onResults((results) => {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                
                // Core Head Position (using nose tip landmark 1)
                const nose = landmarks[1];
                const x = (nose.x - 0.5) * 4;
                const y = -(nose.y - 0.5) * 3;
                const z = -nose.z * 5;

                maskGroup.position.set(-x, y, z); // Mirroring X

                // Rotation calculation (very simplified)
                const leftEyeL = landmarks[33];
                const rightEyeR = landmarks[263];
                const yaw = Math.atan2(rightEyeR.z - leftEyeL.z, rightEyeR.x - leftEyeL.x);
                maskGroup.rotation.y = -yaw;
                
                const chin = landmarks[152];
                const forehead = landmarks[10];
                const pitch = Math.atan2(forehead.z - chin.z, forehead.y - chin.y);
                maskGroup.rotation.x = pitch + Math.PI/2;

                maskGroup.visible = true;
            } else {
                maskGroup.visible = false;
            }
        });

        hands.onResults((results) => {
            // Reset all hand visual visibility
            handPoints.forEach(h => h.forEach(p => p.visible = false));
            
            if (results.multiHandLandmarks) {
                results.multiHandLandmarks.forEach((landmarks, handIndex) => {
                    if (handIndex >= MAX_HANDS) return;

                    // Update Landmarks
                    landmarks.forEach((lm, i) => {
                        const dot = handPoints[handIndex][i];
                        dot.visible = true;
                        dot.position.set(-(lm.x - 0.5) * 5, -(lm.y - 0.5) * 4, -lm.z * 5);
                    });

                    // Gesture: Open Palm check (distance between base and fingertips)
                    const palmOpen = landmarks[8].y < landmarks[5].y; 
                    if (palmOpen) {
                        aiPanel.style.display = 'block';
                        statusPill.innerText = "HUD ACTIVE - ASSISTANT READY";
                    }

                    // Gesture: Pinch (Index + Thumb)
                    const dist = Math.hypot(landmarks[8].x - landmarks[4].x, landmarks[8].y - landmarks[4].y);
                    if (dist < 0.05) {
                        statusPill.style.backgroundColor = "white";
                        statusPill.style.color = "red";
                    } else {
                        statusPill.style.backgroundColor = "rgba(255,0,0,0.5)";
                        statusPill.style.color = "white";
                    }
                });
            }
        });

        // Camera loop
        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({ image: videoElement });
                await hands.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });
        cameraFeed.start();

        // AI Mock Handler
        const aiInput = document.getElementById('ai-input');
        const aiResponse = document.getElementById('ai-response');

        aiInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = aiInput.value;
                aiResponse.innerHTML += `<div style="color:#aaa; margin-top:5px;">> ${query}</div>`;
                
                // Mock AI Logic (Replace with OpenAI Fetch calls here)
                setTimeout(() => {
                    let reply = "Processing command...";
                    if (query.toLowerCase().includes("status")) reply = "Suit integrity at 98%. All web-shooters functional.";
                    if (query.toLowerCase().includes("who")) reply = "You are Peter Parker. I am KAREN, your suit AI.";
                    if (query.toLowerCase().includes("mode")) reply = "Switching to Combat Mode. (Visual update pending...)";
                    
                    aiResponse.innerHTML += `<div style="color:#ff3333; margin-bottom:10px;">KAREN: ${reply}</div>`;
                    aiResponse.scrollTop = aiResponse.scrollHeight;
                }, 600);
                
                aiInput.value = "";
            }
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Subtle HUD breathing effect
            const time = Date.now() * 0.002;
            maskGroup.position.y += Math.sin(time) * 0.001;
            
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log("Spider-Man HUD System Initialized.");
    </script>
</body>
</html>
