<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Holo-Link: Dual-Hand Pro v5</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; user-select: none; }
        #video_container { position: absolute; width: 100vw; height: 100vh; overflow: hidden; z-index: -1; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

        #sidebar { 
            position: absolute; right: 25px; top: 50%; transform: translateY(-50%); 
            display: flex; flex-direction: column; gap: 15px; z-index: 1000; 
        }
        .menu-btn { 
            width: 75px; height: 75px; background: rgba(0, 30, 45, 0.9); 
            border: 2px solid #00f2ff; border-radius: 15px; color: #00f2ff;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; text-align: center;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            pointer-events: auto; -webkit-tap-highlight-color: transparent;
        }
        .menu-btn.active { background: #00f2ff; color: #000; box-shadow: 0 0 25px #00f2ff; }
        .duel-btn { border-color: #ffcc00; color: #ffcc00; }

        #multi-hub {
            position: absolute; top: 15px; right: 15px; background: rgba(0,10,20,0.9);
            padding: 10px; border-radius: 12px; border: 1px solid #00f2ff;
            color: #00f2ff; width: 150px; z-index: 1000; font-size: 11px;
        }
        button { width: 100%; padding: 8px; margin-top: 5px; background: #00f2ff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        input { width: 100%; background: #000; color: #fff; border: 1px solid #00f2ff; padding: 5px; box-sizing: border-box; }

        #duel-header {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: none; text-align: center; color: white; z-index: 100;
        }
        #loading-screen { position: fixed; inset: 0; background: #000; color: #00f2ff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(0, 242, 255, 0.2); border-top: 3px solid #00f2ff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen"><div class="spinner"></div><div>SYNCING NEURAL LINK...</div></div>

    <div id="duel-header">
        <div style="font-size: 32px; font-weight: bold; color: #ff3300;" id="timer">30</div>
        <div style="background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; border: 1px solid #00f2ff;">
            YOU: <span id="my-score">0</span> | ENEMY: <span id="peer-score">0</span>
        </div>
    </div>

    <div id="multi-hub">
        <div id="setup">
            <button onclick="initMulti(true)">CREATE ROOM</button>
            <input type="text" id="join-code" placeholder="CODE" style="margin-top:5px">
            <button onclick="initMulti(false)">JOIN ROOM</button>
        </div>
        <div id="room-info" style="display:none; text-align: center;">ID: <span id="room-id" style="color:white">--</span></div>
    </div>

    <div id="sidebar">
        <div class="menu-btn active" id="btn-shapes" onclick="app.switchMode('shapes')">SHAPES</div>
        <div class="menu-btn" id="btn-earth" onclick="app.switchMode('earth')">EARTH</div>
        <div class="menu-btn duel-btn" id="btn-duel" onclick="app.startDuel()">DUEL</div>
    </div>

    <div id="video_container"><video id="input_video" autoplay playsinline muted></video></div>

<script>
    // --- APP CORE ---
    const app = {
        objects: [], fallingObjects: [], mode: 'shapes', 
        myScore: 0, peerScore: 0, timer: 30, isDuelActive: false, winner: null,
        PINCH_THRESHOLD: 0.04,
        initialScaleDist: 0,
        initialObjectScale: new THREE.Vector3()
    };

    let peer, conn, isHost = false;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 12;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const light = new THREE.PointLight(0x00f2ff, 1200);
    light.position.set(5, 5, 10);
    scene.add(light);

    const raycaster = new THREE.Raycaster();

    // --- SKELETON CONNECTIONS ---
    const connections = [[0,1,2,3,4],[0,5,6,7,8],[5,9,10,11,12],[9,13,14,15,16],[13,17,18,19,20],[0,17]];

    function createHand(color) {
        const group = new THREE.Group();
        const joints = [];
        const lines = [];
        for(let i=0; i<21; i++) {
            const j = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshBasicMaterial({color}));
            joints.push(j); group.add(j);
        }
        connections.forEach(idx => {
            const l = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({color, transparent:true, opacity:0.6}));
            lines.push({line: l, idx}); group.add(l);
        });
        scene.add(group);
        return { group, joints, lines };
    }

    const myHands = [createHand(0x00f2ff), createHand(0x00f2ff)];
    const peerHands = [createHand(0xff0055), createHand(0xff0055)];
    peerHands.forEach(h => h.group.visible = false);

    // --- MAPPING LOGIC (FROM YOUR v4.2) ---
    function mapToScene(lm) {
        const x = (1 - lm.x) * 2 - 1;
        const y = -(lm.y * 2 - 1);
        const vector = new THREE.Vector3(x, y, 0.5);
        vector.unproject(camera);
        const dir = vector.sub(camera.position).normalize();
        const distance = -camera.position.z / dir.z + (lm.z * -10);
        return camera.position.clone().add(dir.multiplyScalar(distance));
    }

    function getPinch(landmarks) {
        const thumb = landmarks[4];
        const index = landmarks[8];
        const dx = thumb.x - index.x;
        const dy = thumb.y - index.y;
        const dz = thumb.z - index.z;
        return Math.sqrt(dx*dx + dy*dy + dz*dz);
    }

    // --- OBJECTS ---
    function spawn(mesh, x, y) {
        mesh.position.set(x, y, 0);
        mesh.userData = { 
            vel: new THREE.Vector3(), 
            rotVel: new THREE.Vector3(0.01, 0.01, 0), 
            isGrabbed: false,
            targetId: null 
        };
        scene.add(mesh); app.objects.push(mesh);
    }

    app.switchMode = (m, broadcast = true) => {
        app.mode = m; app.isDuelActive = false; app.winner = null;
        document.getElementById('duel-header').style.display = 'none';
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + (m==='duel'?'duel':m)).classList.add('active');

        app.objects.forEach(o => scene.remove(o)); app.objects = [];
        app.fallingObjects.forEach(o => scene.remove(o)); app.fallingObjects = [];

        if(m === 'shapes') {
            const geos = [new THREE.IcosahedronGeometry(1.5), new THREE.TorusGeometry(1, 0.3, 16, 32), new THREE.BoxGeometry(1.8, 1.8, 1.8)];
            geos.forEach((g, i) => spawn(new THREE.Mesh(g, new THREE.MeshPhongMaterial({color: 0x0088ff, emissive: 0x002244, transparent:true, opacity:0.8})), (i-1)*4, 0));
        } else if(m === 'earth') {
            spawn(new THREE.Mesh(new THREE.SphereGeometry(3.5, 32, 32), new THREE.MeshPhongMaterial({color: 0x00f2ff, wireframe: true})), 0, 0);
        }
        if(broadcast && conn) conn.send({type: 'mode', value: m});
    };

    // --- DUEL LOGIC ---
    app.startDuel = () => { if(conn) { conn.send({type: 'duel-start'}); startDuelLogic(); } else alert("Connect a friend first!"); };

    function startDuelLogic() {
        app.switchMode('duel', false); app.isDuelActive = true; app.myScore = 0; app.peerScore = 0; app.timer = 30;
        document.getElementById('duel-header').style.display = 'block';
        const t = setInterval(() => {
            app.timer--; document.getElementById('timer').innerText = app.timer;
            if(isHost && app.timer > 0) {
                const x = (Math.random()-0.5)*15, id = Math.random().toString(36);
                spawnFall(x, id, true);
            }
            if(app.timer <= 0) {
                clearInterval(t);
                if(isHost) {
                    const w = app.myScore > app.peerScore ? 'host' : (app.myScore < app.peerScore ? 'guest' : 'draw');
                    conn.send({type: 'game-over', winner: w}); endDuel(w);
                }
            }
        }, 1000);
    }

    function spawnFall(x, id, broadcast) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshPhongMaterial({color: 0xffcc00}));
        m.position.set(x, 10, 0); m.userData = { id };
        scene.add(m); app.fallingObjects.push(m);
        if(broadcast && conn) conn.send({type: 'spawn', x, id});
    }

    function endDuel(w) {
        app.isDuelActive = false;
        if(w === 'host') app.winner = isHost ? 'me' : 'peer';
        else if(w === 'guest') app.winner = isHost ? 'peer' : 'me';
        else app.winner = 'draw';
    }

    // --- MULTIPLAYER ---
    function initMulti(host) {
        isHost = host;
        const id = Math.floor(1000 + Math.random()*9000).toString();
        peer = new Peer(host ? 'holo-'+id : null);
        peer.on('open', (id) => {
            document.getElementById('setup').style.display='none';
            document.getElementById('room-info').style.display='block';
            document.getElementById('room-id').innerText = id.replace('holo-','');
            if(!host) setupConn(peer.connect('holo-'+document.getElementById('join-code').value));
        });
        peer.on('connection', setupConn);
    }

    function setupConn(c) {
        conn = c;
        conn.on('data', d => {
            if(d.type === 'mode') app.switchMode(d.value, false);
            if(d.type === 'hand') {
                const h = peerHands[d.idx]; h.group.visible = true;
                d.pos.forEach((p, i) => h.joints[i].position.set(p.x, p.y, p.z));
                h.lines.forEach(l => l.line.geometry.setFromPoints(l.idx.map(i => h.joints[i].position)));
            }
            if(d.type === 'sync') { const o = app.objects[d.i]; if(o) { o.position.copy(d.p); o.rotation.copy(d.r); o.scale.setScalar(d.s); }}
            if(d.type === 'duel-start') startDuelLogic();
            if(d.type === 'spawn') spawnFall(d.x, d.id, false);
            if(d.type === 'slap') { const o = app.fallingObjects.find(f=>f.userData.id === d.id); if(o) { scene.remove(o); app.fallingObjects.splice(app.fallingObjects.indexOf(o),1); } }
            if(d.type === 'score') { app.peerScore = d.v; document.getElementById('peer-score').innerText=d.v; }
            if(d.type === 'game-over') endDuel(d.winner);
        });
    }

    // --- TRACKING & INTERACTION ---
    const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7 });
    
    hands.onResults(res => {
        document.getElementById('loading-screen').style.display = 'none';
        myHands.forEach(h => h.group.visible = false);

        if (res.multiHandLandmarks) {
            res.multiHandLandmarks.forEach((landmarks, hIdx) => {
                const model = myHands[hIdx];
                model.group.visible = true;

                const worldJoints = landmarks.map(lm => mapToScene(lm));
                worldJoints.forEach((p, i) => model.joints[i].position.copy(p));
                model.lines.forEach(l => l.line.geometry.setFromPoints(l.idx.map(i => model.joints[i].position)));

                const indexTip = worldJoints[8];
                const isPinching = getPinch(landmarks) < app.PINCH_THRESHOLD;

                if(conn) conn.send({type: 'hand', idx: hIdx, pos: model.joints.map(j => j.position)});

                // Grab Logic (Strictly Pinch Based)
                const myGrabbed = app.objects.find(o => o.userData.isGrabbed && o.userData.targetId === hIdx);

                if (isPinching) {
                    if (!myGrabbed) {
                        const screenX = (1 - landmarks[8].x) * 2 - 1;
                        const screenY = -(landmarks[8].y * 2 - 1);
                        raycaster.setFromCamera({x: screenX, y: screenY}, camera);
                        const intersects = raycaster.intersectObjects(app.objects);
                        
                        if (intersects.length > 0 && !intersects[0].object.userData.isGrabbed) {
                            const obj = intersects[0].object;
                            obj.userData.isGrabbed = true;
                            obj.userData.targetId = hIdx;
                        }
                    } else {
                        // Moving
                        const prevPos = myGrabbed.position.clone();
                        myGrabbed.position.lerp(indexTip, 0.2);
                        myGrabbed.userData.vel.copy(myGrabbed.position).sub(prevPos);

                        // Scaling Logic (Two Hands)
                        if (res.multiHandLandmarks.length === 2) {
                            const otherIdx = 1 - hIdx;
                            const otherPinching = getPinch(res.multiHandLandmarks[otherIdx]) < app.PINCH_THRESHOLD;
                            
                            if (otherPinching) {
                                const handA = indexTip;
                                const handB = mapToScene(res.multiHandLandmarks[otherIdx][8]);
                                const currentDist = handA.distanceTo(handB);
                                
                                if (app.initialScaleDist === 0) {
                                    app.initialScaleDist = currentDist;
                                    app.initialObjectScale.copy(myGrabbed.scale);
                                } else {
                                    const ratio = currentDist / app.initialScaleDist;
                                    const s = THREE.MathUtils.clamp(app.initialObjectScale.x * ratio, 0.2, 5);
                                    myGrabbed.scale.set(s, s, s);
                                }
                            }
                        }
                        if(conn) conn.send({type: 'sync', i: app.objects.indexOf(myGrabbed), p: myGrabbed.position, r: myGrabbed.rotation, s: myGrabbed.scale.x});
                    }
                } else {
                    // Release
                    if (myGrabbed) {
                        myGrabbed.userData.isGrabbed = false;
                        myGrabbed.userData.targetId = null;
                        app.initialScaleDist = 0;
                    }
                    
                    // Duel Slap (Collision when NOT pinching)
                    if (app.isDuelActive) {
                        app.fallingObjects.forEach(o => {
                            if(indexTip.distanceTo(o.position) < 1.5) {
                                app.myScore++; document.getElementById('my-score').innerText = app.myScore;
                                scene.remove(o); app.fallingObjects.splice(app.fallingObjects.indexOf(o),1);
                                if(conn) { conn.send({type: 'slap', id: o.userData.id}); conn.send({type: 'score', v: app.myScore}); }
                            }
                        });
                    }
                }
            });
        }
    });

    new Camera(document.getElementById('input_video'), {
        onFrame: async () => await hands.send({ image: document.getElementById('input_video') }),
        width: 1280, height: 720
    }).start();

    // --- ANIMATION ---
    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;

        if (app.winner) {
            const h = (time * 0.5) % 1;
            const targetSet = app.winner === 'me' ? myHands : peerHands;
            targetSet.forEach(hand => {
                hand.joints.forEach(j => j.material.color.setHSL(h, 1, 0.5));
                hand.lines.forEach(l => l.line.material.color.setHSL(h, 1, 0.5));
            });
        }

        if (app.isDuelActive) app.fallingObjects.forEach(o => { o.position.y -= 0.12; o.rotation.x += 0.05; });

        app.objects.forEach(o => {
            if (!o.userData.isGrabbed) {
                o.position.add(o.userData.vel);
                o.rotation.x += o.userData.rotVel.x; o.rotation.y += o.userData.rotVel.y;
                o.position.y += Math.sin(time + app.objects.indexOf(o)) * 0.005;
                o.userData.vel.multiplyScalar(0.97);
                if(Math.abs(o.position.x) > 16) o.userData.vel.x *= -1;
                if(Math.abs(o.position.y) > 11) o.userData.vel.y *= -1;
            }
        });

        renderer.render(scene, camera);
    }
    app.switchMode('shapes');
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
