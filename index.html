<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Spatial UI - Iron Man Interface</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #video-container { position: absolute; width: 240px; height: 180px; bottom: 20px; right: 20px; border-radius: 10px; overflow: hidden; border: 2px solid #00f2ff; z-index: 10; transform: scaleX(-1); }
        #ui-overlay { position: absolute; top: 20px; left: 20px; color: #00f2ff; pointer-events: none; z-index: 10; text-transform: uppercase; letter-spacing: 2px; }
        .mode-indicator { font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #00f2ff; }
        .status-bar { font-size: 12px; margin-top: 5px; opacity: 0.8; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="mode-indicator" id="mode-text">INITIALIZING...</div>
        <div class="status-bar" id="gesture-text">System Ready</div>
    </div>
    <div id="video-container">
        <video id="input-video" style="width: 100%; height: 100%; object-fit: cover;"></video>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        /** 
         * CONFIGURATION & STATE
         */
        const MODES = { DEFAULT: 'Object Interaction', UI: 'UI/Map Mode', ASSEMBLY: 'Gauntlet Assembly' };
        let currentMode = MODES.DEFAULT;
        let gestureDebounce = 0;

        // Three.js Core
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0x00f2ff, 2, 100);
        light.position.set(0, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        /**
         * 3D WORLD MAP (GLOBE)
         */
        const globeGroup = new THREE.Group();
        const globeGeometry = new THREE.SphereGeometry(2, 64, 64);
        const globeMaterial = new THREE.MeshPhongMaterial({
            color: 0x001122,
            emissive: 0x004488,
            wireframe: true,
            transparent: true,
            opacity: 0.6
        });
        const globe = new THREE.Mesh(globeGeometry, globeMaterial);
        
        // Add a "holographic" atmosphere
        const atmosGeom = new THREE.SphereGeometry(2.1, 32, 32);
        const atmosMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.1 });
        const atmosphere = new THREE.Mesh(atmosGeom, atmosMat);
        
        globeGroup.add(globe);
        globeGroup.add(atmosphere);
        globeGroup.position.z = -5;
        globeGroup.visible = false;
        scene.add(globeGroup);

        /**
         * PARTICLE ASSEMBLY SYSTEM (GAUNTLET)
         */
        const particleCount = 2500;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const targetPositions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        // Define a "Gauntlet" shape (a cylinder with hand-like proportions)
        for (let i = 0; i < particleCount; i++) {
            // Initial Random Chaos
            positions[i * 3] = (Math.random() - 0.5) * 20;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 20;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 20;

            // Target: A stylized Gauntlet/Arm shape
            const phi = Math.random() * Math.PI * 2;
            const theta = Math.random() * Math.PI;
            const r = 0.5 + Math.random() * 0.2;
            
            // Basic cylinder/arm form
            targetPositions[i * 3] = r * Math.cos(phi); 
            targetPositions[i * 3 + 1] = (Math.random() - 0.5) * 4; // Height
            targetPositions[i * 3 + 2] = r * Math.sin(phi);

            // Tech Blue Colors
            colors[i * 3] = 0;
            colors[i * 3 + 1] = Math.random();
            colors[i * 3 + 2] = 1;
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const particleMaterial = new THREE.PointsMaterial({
            size: 0.05,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const gauntletParticles = new THREE.Points(particleGeometry, particleMaterial);
        gauntletParticles.visible = false;
        scene.add(gauntletParticles);

        /**
         * INTERACTION LOGIC
         */
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isAssembled = false;

        function transitionToMode(mode) {
            if (currentMode === mode || Date.now() < gestureDebounce) return;
            currentMode = mode;
            gestureDebounce = Date.now() + 1000;
            
            document.getElementById('mode-text').innerText = mode;
            
            // Reset visibilities
            globeGroup.visible = (mode === MODES.UI);
            
            if (mode === MODES.ASSEMBLY) {
                gauntletParticles.visible = true;
                assembleParticles();
            } else {
                disassembleParticles();
            }
        }

        function assembleParticles() {
            const posAttr = gauntletParticles.geometry.attributes.position;
            for (let i = 0; i < particleCount; i++) {
                gsap.to(posAttr.array, {
                    [i * 3]: targetPositions[i * 3],
                    [i * 3 + 1]: targetPositions[i * 3 + 1],
                    [i * 3 + 2]: targetPositions[i * 3 + 2],
                    duration: 1.5 + Math.random(),
                    ease: "expo.out",
                    onUpdate: () => posAttr.needsUpdate = true
                });
            }
            isAssembled = true;
        }

        function disassembleParticles() {
            const posAttr = gauntletParticles.geometry.attributes.position;
            for (let i = 0; i < particleCount; i++) {
                gsap.to(posAttr.array, {
                    [i * 3]: (Math.random() - 0.5) * 20,
                    [i * 3 + 1]: (Math.random() - 0.5) * 20,
                    [i * 3 + 2]: (Math.random() - 0.5) * 20,
                    duration: 2,
                    ease: "power2.inOut",
                    onUpdate: () => posAttr.needsUpdate = true,
                    onComplete: () => { if(currentMode !== MODES.ASSEMBLY) gauntletParticles.visible = false; }
                });
            }
            isAssembled = false;
        }

        /**
         * MEDIAPIPE HANDS SETUP
         */
        const videoElement = document.getElementById('input-video');
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;

            const hand = results.multiHandLandmarks[0];
            const indexTip = hand[8];
            const thumbTip = hand[4];
            
            // Map index tip to screen space for raycasting
            mouse.x = -(indexTip.x * 2 - 1); // Flip X for mirror
            mouse.y = -(indexTip.y * 2 - 1);

            // 1. Gesture Recognition Logic
            const isFist = detectFist(hand);
            const isOpenPalm = detectOpenPalm(hand);
            const isPointing = detectPointing(hand);
            const isPinching = getDistance(indexTip, thumbTip) < 0.05;

            // 2. Mode Switching
            if (isOpenPalm) transitionToMode(MODES.UI);
            if (isFist) transitionToMode(MODES.DEFAULT);
            if (isPointing && currentMode === MODES.UI) {
                // Pointing triggers assembly from UI mode
                transitionToMode(MODES.ASSEMBLY);
            }

            // 3. Mode Specific Interactions
            if (currentMode === MODES.UI) {
                globeGroup.rotation.y += 0.01;
                // Raycasting for globe interaction
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(globe);
                if (intersects.length > 0) {
                    globe.material.emissive.setHex(0x00ffcc);
                    if (isPinching) {
                        globeGroup.rotation.y += mouse.x * 0.1;
                    }
                } else {
                    globe.material.emissive.setHex(0x004488);
                }
            }

            if (currentMode === MODES.ASSEMBLY && isAssembled) {
                // Attach particles to hand position
                gauntletParticles.position.x = -mouse.x * 5;
                gauntletParticles.position.y = mouse.y * 5;
                gauntletParticles.position.z = -2;
                
                // Rotate based on hand tilt
                gauntletParticles.rotation.z = Math.atan2(hand[12].y - hand[0].y, hand[12].x - hand[0].x) + Math.PI/2;
            }

            document.getElementById('gesture-text').innerText = 
                `Gestures: ${isOpenPalm ? 'PALM' : isFist ? 'FIST' : isPointing ? 'POINT' : isPinching ? 'PINCH' : 'NONE'}`;
        });

        /**
         * GESTURE HELPERS
         */
        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        function detectFist(landmarks) {
            // If tips of fingers are close to the palm base
            const tips = [8, 12, 16, 20];
            return tips.every(t => getDistance(landmarks[t], landmarks[0]) < 0.2);
        }

        function detectOpenPalm(landmarks) {
            const tips = [8, 12, 16, 20];
            return tips.every(t => landmarks[t].y < landmarks[t-2].y);
        }

        function detectPointing(landmarks) {
            const indexExtended = landmarks[8].y < landmarks[6].y;
            const middleCurled = landmarks[12].y > landmarks[10].y;
            const ringCurled = landmarks[16].y > landmarks[14].y;
            return indexExtended && middleCurled && ringCurled;
        }

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        cameraUtils.start();

        /**
         * ANIMATION LOOP
         */
        function animate() {
            requestAnimationFrame(animate);
            
            // Subtle idle floating for globe
            if (globeGroup.visible) {
                globeGroup.position.y = Math.sin(Date.now() * 0.001) * 0.1;
            }

            // Energy Pulse VFX
            if (gauntletParticles.visible) {
                particleMaterial.size = 0.05 + Math.sin(Date.now() * 0.01) * 0.02;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
        transitionToMode(MODES.DEFAULT);
    </script>
</body>
</html>
