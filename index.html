<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPIDER-MAN AR HELMET SYSTEM</title>
    
    <!-- MediaPipe Requirements -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }

        /* LAYER 1: VIDEO */
        #video_container {
            position: absolute;
            width: 100vw; height: 100vh;
            transform: scaleX(-1); /* Mirror Mode */
        }
        #input_video { width: 100%; height: 100%; object-fit: cover; }

        /* LAYER 2: HAND OVERLAY (2D) */
        #hand_canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 5;
            pointer-events: none;
            transform: scaleX(-1); /* Mirror to match video */
        }

        /* LAYER 3: THREE.JS (3D) */
        #three_canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10;
            pointer-events: none;
        }

        /* UI & AI PANEL */
        #ui_overlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            pointer-events: none;
            border: 2px solid rgba(255, 0, 0, 0.2);
            box-sizing: border-box;
        }

        #ai_assistant {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 320px;
            height: 400px;
            background: rgba(20, 0, 0, 0.8);
            border: 1px solid #ff0000;
            border-top: 4px solid #ff0000;
            pointer-events: auto;
            color: #fff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            backdrop-filter: blur(5px);
        }

        .chat_header { padding: 10px; background: rgba(255,0,0,0.2); font-weight: bold; font-size: 12px; letter-spacing: 2px; }
        #chat_history { flex-grow: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        .ai_msg { color: #ff5555; margin-bottom: 8px; }
        .user_msg { color: #ffffff; margin-bottom: 8px; text-align: right; }
        .chat_input_area { display: flex; padding: 10px; border-top: 1px solid rgba(255,0,0,0.3); }
        #user_input { background: transparent; border: 1px solid #ff0000; color: white; flex-grow: 1; padding: 5px; outline: none; }
        #send_btn { background: #ff0000; border: none; color: white; padding: 5px 15px; cursor: pointer; margin-left: 5px; }

        /* DEBUG STYLES */
        #debug_panel {
            position: absolute;
            top: 10px; left: 10px;
            background: rgba(0,0,0,0.7);
            color: #0f0; padding: 10px;
            font-size: 10px; z-index: 100;
            border: 1px solid #0f0;
        }

        /* HUD ELEMENTS */
        .hud_bracket { position: absolute; width: 50px; height: 50px; border: 2px solid #ff0000; pointer-events: none; opacity: 0.5; }
        .tl { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .tr { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
        .bl { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
        .br { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

        .scanning_line {
            width: 100%; height: 2px;
            background: rgba(255, 0, 0, 0.3);
            position: absolute;
            animation: scan 3s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

    <!-- LAYER 1 -->
    <div id="video_container">
        <video id="input_video" autoplay playsinline></video>
    </div>

    <!-- LAYER 2 -->
    <canvas id="hand_canvas"></canvas>

    <!-- LAYER 3 -->
    <canvas id="three_canvas"></canvas>

    <!-- DEBUG MODE -->
    <div id="debug_panel">
        SYSTEM STATUS: ONLINE<br>
        FPS: <span id="fps">0</span><br>
        HANDS: <span id="hand_count">0</span><br>
        FACE DETECTED: <span id="face_status">FALSE</span>
    </div>

    <!-- HUD & AI -->
    <div id="ui_overlay">
        <div class="hud_bracket tl"></div>
        <div class="hud_bracket tr"></div>
        <div class="hud_bracket bl"></div>
        <div class="hud_bracket br"></div>
        <div class="scanning_line"></div>

        <div id="ai_assistant">
            <div class="chat_header">K.A.R.E.N. OS - AI ASSISTANT</div>
            <div id="chat_history">
                <div class="ai_msg">KAREN: Helmet systems initialized. Hand tracking active. How can I help you, Peter?</div>
            </div>
            <div class="chat_input_area">
                <input type="text" id="user_input" placeholder="Enter command...">
                <button id="send_btn">SEND</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * INITIALIZATION & GLOBAL CONFIG
         */
        const videoElement = document.getElementById('input_video');
        const handCanvas = document.getElementById('hand_canvas');
        const handCtx = handCanvas.getContext('2d');
        const threeCanvas = document.getElementById('three_canvas');
        const debugFps = document.getElementById('fps');
        const debugHands = document.getElementById('hand_count');
        const debugFace = document.getElementById('face_status');

        // Resize function for all layers
        function resize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            handCanvas.width = w;
            handCanvas.height = h;
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', resize);

        /**
         * THREE.JS SYSTEM (LAYER 3)
         */
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        
        // LIGHTING
        const light = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(light);
        const pointLight = new THREE.PointLight(0xff0000, 2);
        pointLight.position.set(0, 2, 2);
        scene.add(pointLight);

        // SPIDER-MAN MASK (Procedural)
        const maskGroup = new THREE.Group();
        scene.add(maskGroup);

        const headGeom = new THREE.SphereGeometry(1, 32, 32);
        const headMat = new THREE.MeshPhongMaterial({ 
            color: 0xcc0000, 
            shininess: 80,
            transparent: true,
            opacity: 0.9
        });
        const headMesh = new THREE.Mesh(headGeom, headMat);
        headMesh.scale.set(0.9, 1.2, 0.95);
        maskGroup.add(headMesh);

        // White Eye Lenses
        const eyeGeom = new THREE.SphereGeometry(0.3, 32, 32);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        const leftEye = new THREE.Mesh(eyeGeom, eyeMat);
        leftEye.position.set(0.35, 0.2, 0.75);
        leftEye.scale.set(1.4, 0.7, 0.1);
        leftEye.rotation.z = -0.3;
        
        const rightEye = new THREE.Mesh(eyeGeom, eyeMat);
        rightEye.position.set(-0.35, 0.2, 0.75);
        rightEye.scale.set(1.4, 0.7, 0.1);
        rightEye.rotation.z = 0.3;
        
        maskGroup.add(leftEye, rightEye);
        maskGroup.visible = false;

        camera.position.z = 5;

        /**
         * MEDIAPIPE TRACKING (HANDS & FACE)
         */
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // HAND RESULTS PROCESSING
        hands.onResults((results) => {
            handCtx.save();
            handCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                debugHands.innerText = results.multiHandLandmarks.length;
                
                for (const landmarks of results.multiHandLandmarks) {
                    // Draw Skeleton
                    drawConnectors(handCtx, landmarks, HAND_CONNECTIONS, {color: '#ff0000', lineWidth: 3});
                    // Draw Glowing Joints
                    drawLandmarks(handCtx, landmarks, {
                        color: '#ffffff', 
                        lineWidth: 1, 
                        radius: 5
                    });
                }
            } else {
                debugHands.innerText = "NO HAND DETECTED";
            }
            handCtx.restore();
        });

        // FACE RESULTS PROCESSING
        faceMesh.onResults((results) => {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                debugFace.innerText = "TRUE";
                const face = results.multiFaceLandmarks[0];
                
                // Map nose bridge (landmark 1) to screen space
                const nose = face[1];
                const x = (nose.x - 0.5) * 8; // Multipliers to match camera frustum
                const y = -(nose.y - 0.5) * 6;
                const z = -nose.z * 10;

                maskGroup.position.set(-x, y, z); // Mirrored X
                
                // Calculate Scale (based on face width)
                const left = face[234];
                const right = face[454];
                const width = Math.hypot(left.x - right.x, left.y - right.y);
                maskGroup.scale.setScalar(width * 6); // Adjust 6 to calibrate fit

                // Calculate Rotation
                const top = face[10];
                const bottom = face[152];
                const pitch = Math.atan2(bottom.z - top.z, bottom.y - top.y) + Math.PI/2;
                const yaw = Math.atan2(right.z - left.z, right.x - left.x);
                
                maskGroup.rotation.set(pitch, -yaw, 0);
                maskGroup.visible = true;
            } else {
                debugFace.innerText = "FALSE";
                maskGroup.visible = false;
            }
        });

        // CAMERA FEED
        const mpCamera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
                await faceMesh.send({image: videoElement});
            },
            width: 1280, height: 720
        });
        mpCamera.start();

        /**
         * AI ASSISTANT LOGIC
         */
        const chatHistory = document.getElementById('chat_history');
        const userInput = document.getElementById('user_input');
        const sendBtn = document.getElementById('send_btn');

        async function handleChat() {
            const text = userInput.value.trim();
            if (!text) return;

            // Display User Message
            chatHistory.innerHTML += `<div class="user_msg">ME: ${text}</div>`;
            userInput.value = "";
            chatHistory.scrollTop = chatHistory.scrollHeight;

            // Thinking State
            const thinkingId = "thought_" + Date.now();
            chatHistory.innerHTML += `<div class="ai_msg" id="${thinkingId}">KAREN: Thinking...</div>`;

            // SIMULATED / REAL AI CALL
            // To use real OpenAI: Replace setTimeout with fetch('https://api.openai.com/v1/...')
            setTimeout(() => {
                const thoughtEl = document.getElementById(thinkingId);
                let response = "I'm sorry Peter, I don't have information on that yet.";
                
                const lowerText = text.toLowerCase();
                if (lowerText.includes("status")) response = "All systems green. Web fluid at 85%.";
                if (lowerText.includes("who are you")) response = "I am K.A.R.E.N., your Knowledge Estimate and Response Network.";
                if (lowerText.includes("damage")) response = "Armor integrity is at 100%. Scanning for local threats...";
                if (lowerText.includes("hello") || lowerText.includes("hey")) response = "Greetings, Peter. Ready for patrol.";

                thoughtEl.innerHTML = `KAREN: ${response}`;
                chatHistory.scrollTop = chatHistory.scrollHeight;
            }, 1000);
        }

        sendBtn.addEventListener('click', handleChat);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleChat(); });

        /**
         * ANIMATION LOOP
         */
        let lastTime = 0;
        function animate(time) {
            // FPS Counter
            const delta = time - lastTime;
            lastTime = time;
            debugFps.innerText = Math.round(1000 / delta);

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        resize();
        requestAnimationFrame(animate);

    </script>
</body>
</html>
